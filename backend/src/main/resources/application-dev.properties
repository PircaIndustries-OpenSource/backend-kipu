# Server Port Setup
server.port=8080

# Database Connection String - Fixed with Security Fail-safes
spring.datasource.url=jdbc:mysql://localhost:3306/kipu_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
